name: climb_endurance
description: Local-first climbing endurance training tracker.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  fl_chart: ^1.2.0
  intl: ^0.20.2
  path: ^1.9.1
  sqflite: ^2.4.2
  sqflite_common_ffi: 2.3.6
  csv: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

dependency_overrides:
  sqlite3: 2.7.6

flutter:
  uses-material-design: true
